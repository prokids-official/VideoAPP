<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="design-version" content="1" />
<title>FableGlitch Studio · 新建剧集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0b; --surface:#131316; --surface-2:#18181d; --surface-3:#1e1e24;
  --border:#25252c; --border-hi:#35353d;
  --text:#f5f5f7; --text-2:#a1a1a8; --text-3:#6b6b72; --text-4:#4a4a50;
  --accent:#9b7cff; --accent-hi:#b294ff;
  --accent-bg:rgba(155,124,255,.12); --accent-border:rgba(155,124,255,.35);
  --green:#4ade80; --amber:#fbbf24; --red:#f87171;
  --gradient-brand:linear-gradient(135deg,#9b7cff 0%,#e879f9 100%);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter','Noto Sans SC',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
  min-height:100vh;
  /* faint dashboard underneath, blurred */
  background-image:
    linear-gradient(rgba(10,10,11,0.65), rgba(10,10,11,0.65)),
    radial-gradient(circle at 20% 30%, rgba(155,124,255,0.08), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(232,121,249,0.06), transparent 55%);
}
.scrim{
  position:fixed; inset:0;
  backdrop-filter:blur(20px) saturate(120%);
  -webkit-backdrop-filter:blur(20px) saturate(120%);
  background:rgba(10,10,11,0.55);
  display:flex; align-items:center; justify-content:center;
  padding:48px 24px;
}

.modal{
  width:720px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:40px 48px 32px;
  position:relative;
  box-shadow:0 30px 80px -20px rgba(0,0,0,0.6);
}

.close{
  position:absolute; top:16px; right:16px;
  width:32px; height:32px;
  border-radius:8px;
  background:transparent; border:0;
  color:var(--text-3);
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.close:hover{ background:var(--surface-2); color:var(--text); }

/* steps */
.steps{
  display:flex; align-items:center; gap:0;
  margin-bottom:40px;
  padding:8px 0 16px;
}
.step{
  display:flex; align-items:center; gap:10px;
  flex:0 0 auto;
  font-family:var(--mono); font-size:12px;
  color:var(--text-3);
}
.step .num{
  width:26px; height:26px; border-radius:50%;
  background:var(--surface-2);
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--sans); font-size:13px; font-weight:600;
  color:var(--text-3);
  flex:0 0 26px;
}
.step .lbl{ white-space:nowrap; }
.step.done .num{
  background:rgba(74,222,128,0.10);
  border-color:rgba(74,222,128,0.40);
  color:var(--green);
}
.step.done .lbl{ color:var(--text-2); }
.step.active .num{
  background:var(--accent-bg);
  border-color:var(--accent-border);
  color:var(--accent-hi);
}
.step.active .lbl{ color:var(--text); }

.connector{
  flex:1; height:1px;
  background:var(--border);
  margin:0 14px;
}
.connector.done{ background:rgba(74,222,128,0.40); }

.kicker{
  font-size:12px;
  color:var(--text-3);
  letter-spacing:-0.005em;
  margin-bottom:10px;
}

.h{
  font-size:28px; font-weight:600;
  letter-spacing:-0.02em; margin:0 0 28px;
  line-height:1.2;
}

.field{ margin-bottom:24px; }
.label{ display:block; font-size:13px; color:var(--text-2); margin-bottom:8px; font-weight:500; }
.input{
  width:100%; height:48px;
  padding:0 16px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:var(--sans); font-size:15px;
  outline:none; transition:border-color .15s, background .15s;
}
.input:focus{ border-color:var(--accent-border); background:var(--surface-3); }
.input::placeholder{ color:var(--text-4); }

.preview{
  margin-top:14px;
  padding:16px 18px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:10px;
}
.preview .pl{
  font-size:12px;
  color:var(--text-3);
  margin-bottom:8px; letter-spacing:-0.005em;
}
.preview .path{
  font-family:var(--mono); font-size:14px;
  color:var(--text-2);
  letter-spacing:-0.005em;
  word-break:break-all;
}
.preview .path .seg{ color:var(--accent-hi); }
.preview .path .sep{ color:var(--text-4); margin:0 2px; }

.foot{
  margin-top:32px;
  display:flex; justify-content:space-between; align-items:center;
  padding-top:20px;
  border-top:1px solid var(--border);
}

.btn{
  height:44px; padding:0 22px;
  border:0; border-radius:10px;
  font-family:var(--sans); font-size:14px; font-weight:500;
  letter-spacing:-0.005em; cursor:pointer;
  display:inline-flex; align-items:center; gap:8px;
  transition:filter .15s, background .15s, border-color .15s;
}
.btn-secondary{
  background:transparent;
  color:var(--text-2);
  border:1px solid var(--border);
}
.btn-secondary:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-hi); }
.btn-primary{
  background:var(--gradient-brand);
  color:#fff; font-weight:600;
}
.btn-primary:hover{ filter:brightness(1.08); }

.help{
  font-size:12px; color:var(--text-3);
  letter-spacing:-0.005em;
}
</style>
</head>
<body>
  <div class="scrim">
    <div class="modal">
      <button class="close" aria-label="关闭">×</button>

      <!-- step indicator -->
      <div class="steps">
        <div class="step done">
          <div class="num">✓</div><div class="lbl">选系列</div>
        </div>
        <div class="connector done"></div>
        <div class="step done">
          <div class="num">✓</div><div class="lbl">选专辑</div>
        </div>
        <div class="connector done"></div>
        <div class="step done">
          <div class="num">✓</div><div class="lbl">填内容名</div>
        </div>
        <div class="connector"></div>
        <div class="step active">
          <div class="num">4</div><div class="lbl">填剧集名</div>
        </div>
      </div>

      <div class="kicker">第 4 步 / 共 4 步</div>
      <h2 class="h">为这一集起个正式名字</h2>

      <div class="field">
        <label class="label">剧集名</label>
        <input class="input" type="text" value="侏儒怪 第一集" placeholder="如：侏儒怪 第一集" />
      </div>

      <div class="preview">
        <div class="pl">剧集路径预览</div>
        <div class="path">
          <span class="seg">童话剧</span><span class="sep">_</span><span class="seg">NA</span><span class="sep">_</span><span class="seg">侏儒怪</span><span class="sep">_</span><span class="seg">侏儒怪 第一集</span>
        </div>
      </div>

      <div class="foot">
        <button class="btn btn-secondary">← 上一步</button>
        <div style="display:flex;align-items:center;gap:18px">
          <span class="help">回车 创建</span>
          <button class="btn btn-primary">创建骨架</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
