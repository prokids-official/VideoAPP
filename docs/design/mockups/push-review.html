<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="design-version" content="1" />
<title>FableGlitch Studio · 入库评审</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0b; --surface:#131316; --surface-2:#18181d; --surface-3:#1e1e24;
  --border:#25252c; --border-hi:#35353d;
  --text:#f5f5f7; --text-2:#a1a1a8; --text-3:#6b6b72; --text-4:#4a4a50;
  --accent:#9b7cff; --accent-hi:#b294ff;
  --accent-bg:rgba(155,124,255,.12); --accent-border:rgba(155,124,255,.35);
  --green:#4ade80; --amber:#fbbf24; --red:#f87171;
  --gradient-brand:linear-gradient(135deg,#9b7cff 0%,#e879f9 100%);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter','Noto Sans SC',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* topnav */
.topnav{
  height:56px; flex:0 0 56px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; padding:0 24px; gap:24px;
}
.brand{
  font-size:15px; font-weight:700; letter-spacing:-0.015em;
  background:var(--gradient-brand);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.spacer{ flex:1; }
.user{ display:flex; align-items:center; gap:10px; padding:6px 10px 6px 6px; border-radius:24px; }
.avatar{ width:28px; height:28px; border-radius:50%; background:var(--gradient-brand);
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600; }
.user-name{ font-family:var(--mono); font-size:12px; color:var(--text-2); }

/* breadcrumb back link */
.subnav{
  border-bottom:1px solid var(--border);
  background:var(--surface);
  padding:10px 32px;
}
.back{
  font-size:13px; color:var(--text-3); text-decoration:none;
  letter-spacing:-0.005em;
}
.back:hover{ color:var(--text); }

/* main */
.main{ flex:1; overflow-y:auto; padding:48px 40px 140px; }
.inner{ max-width:880px; margin:0 auto; }

h1{
  font-size:32px; font-weight:700; letter-spacing:-0.018em;
  margin:0 0 14px; line-height:1.15;
}
.sub{
  font-size:13px; color:var(--text-3);
  margin-bottom:48px;
  letter-spacing:-0.005em;
}
.sub .dot{ color:var(--text-4); margin:0 8px; }
.sub .num{ font-family:var(--mono); color:var(--text-2); }
.sub .branch{
  font-family:var(--mono); color:var(--text-2);
  background:var(--surface-2); padding:1px 7px; border-radius:5px;
}

.section{
  margin-bottom:32px;
}
.section-head{
  display:flex; align-items:baseline; gap:10px;
  margin-bottom:14px;
}
.section-head .name{
  font-size:17px; font-weight:600; letter-spacing:-0.01em;
}
.section-head .count{
  font-family:var(--mono); font-size:12px; color:var(--text-3);
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.item{
  display:flex; align-items:center; gap:14px;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
}
.item:last-child{ border-bottom:0; }
.item:hover{ background:var(--surface-2); }

.cb{
  width:18px; height:18px; flex:0 0 18px;
  border-radius:5px;
  border:1.5px solid var(--border-hi);
  background:var(--surface-2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.cb.on{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-size:11px;
  font-weight:700;
}
.cb.on::after{ content:"✓"; }

.fname{
  font-family:var(--mono); font-size:13px;
  color:var(--text); flex:1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.size{ font-family:var(--mono); font-size:11px; color:var(--text-3); flex:0 0 auto; }

.tag{
  font-family:var(--mono); font-size:10px;
  padding:3px 7px; border-radius:4px;
  letter-spacing:0.04em;
  flex:0 0 auto;
}
.tag-conv{
  background:rgba(155,124,255,0.10);
  border:1px solid var(--accent-border);
  color:var(--accent-hi);
}

/* commit message */
.commit{
  margin-top:16px;
}
.commit .label{
  display:block; font-size:13px; color:var(--text-2); font-weight:500;
  margin-bottom:8px;
}
.commit textarea{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  color:var(--text);
  font-family:var(--mono); font-size:13px;
  resize:vertical; min-height:64px;
  outline:none;
  letter-spacing:0;
  line-height:1.5;
}
.commit textarea:focus{ border-color:var(--accent-border); background:var(--surface-2); }

/* sticky bottom bar */
.bottom{
  position:fixed; left:0; right:0; bottom:0;
  background:rgba(19,19,22,0.85);
  backdrop-filter:blur(18px) saturate(120%);
  -webkit-backdrop-filter:blur(18px) saturate(120%);
  border-top:1px solid var(--border);
  padding:16px 40px;
}
.bottom-inner{
  max-width:880px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between;
}
.summary{
  font-size:13px; color:var(--text-3);
  letter-spacing:-0.005em;
}
.summary .num{
  font-family:var(--mono); color:var(--text);
}
.summary .accent{ color:var(--accent-hi); }
.push{
  height:48px; padding:0 26px;
  border:0; border-radius:24px;
  background:var(--gradient-brand);
  color:#fff; font-weight:600; font-size:15px;
  font-family:var(--sans); letter-spacing:-0.005em;
  cursor:pointer;
  display:inline-flex; align-items:center; gap:10px;
  box-shadow:0 6px 18px -2px rgba(155,124,255,0.45);
  transition:filter .15s, box-shadow .15s, transform .05s;
}
.push:hover{ filter:brightness(1.08); box-shadow:0 8px 22px -2px rgba(155,124,255,0.55); }
.push:active{ transform:translateY(1px); }
</style>
</head>
<body>

  <div class="topnav">
    <div class="brand">FableGlitch</div>
    <div class="spacer"></div>
    <div class="user">
      <div class="avatar">乐</div>
      <div class="user-name">lemeilin@beva.com</div>
    </div>
  </div>

  <div class="subnav">
    <a class="back" href="#">← 童话剧 / 格林童话 / 侏儒怪 / 侏儒怪 第一集</a>
  </div>

  <main class="main">
    <div class="inner">

      <h1>入库评审 · 侏儒怪 第一集</h1>
      <div class="sub">
        <span class="num">3</span> 项待入库
        <span class="dot">·</span>
        总计 <span class="num">4.2 MB</span>
        <span class="dot">·</span>
        目标分支 <span class="branch">main</span>
      </div>

      <!-- 剧本 -->
      <div class="section">
        <div class="section-head">
          <span class="name">📝 剧本</span>
          <span class="count">1 项</span>
        </div>
        <div class="card">
          <div class="item">
            <div class="cb on"></div>
            <div class="fname">童话剧_侏儒怪_SCRIPT.md</div>
            <div class="tag tag-conv">来自 .docx 转换</div>
            <div class="size">12.5 KB</div>
          </div>
        </div>
      </div>

      <!-- 角色 -->
      <div class="section">
        <div class="section-head">
          <span class="name">👤 角色</span>
          <span class="count">2 项</span>
        </div>
        <div class="card">
          <div class="item">
            <div class="cb on"></div>
            <div class="fname">侏儒怪_CHAR_主角_白天_v001.png</div>
            <div class="size">1.2 MB</div>
          </div>
          <div class="item">
            <div class="cb on"></div>
            <div class="fname">侏儒怪_CHAR_NPC_v001.png</div>
            <div class="size">2.1 MB</div>
          </div>
        </div>
      </div>

      <!-- commit message -->
      <div class="commit">
        <label class="label">commit message</label>
        <textarea>feat(侏儒怪 第一集): 剧本初稿 + 主角设定 by 乐美林</textarea>
      </div>

    </div>
  </main>

  <div class="bottom">
    <div class="bottom-inner">
      <div class="summary">
        已选 <span class="num accent">3</span> 项 · <span class="num accent">4.2 MB</span>
      </div>
      <button class="push">⚡ 推送</button>
    </div>
  </div>

</body>
</html>
