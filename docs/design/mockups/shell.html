<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="design-version" content="1" />
<title>FableGlitch Studio · 欢迎</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0b; --surface:#131316; --surface-2:#18181d; --surface-3:#1e1e24;
  --border:#25252c; --border-hi:#35353d;
  --text:#f5f5f7; --text-2:#a1a1a8; --text-3:#6b6b72; --text-4:#4a4a50;
  --accent:#9b7cff; --accent-hi:#b294ff;
  --accent-bg:rgba(155,124,255,.12); --accent-border:rgba(155,124,255,.35);
  --green:#4ade80; --amber:#fbbf24; --red:#f87171;
  --gradient-brand:linear-gradient(135deg,#9b7cff 0%,#e879f9 100%);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter','Noto Sans SC',system-ui,sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  letter-spacing:-0.005em;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex; flex-direction:column;
}

/* ── top nav ───────────────────────────────────────── */
.topnav{
  height:56px;
  flex:0 0 56px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center;
  padding:0 24px;
  gap:24px;
}
.brand{
  font-size:15px;
  font-weight:700;
  letter-spacing:-0.015em;
  background:var(--gradient-brand);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.spacer{ flex:1; }
.user{
  display:flex; align-items:center; gap:10px;
  padding:6px 10px 6px 6px;
  border-radius:24px;
  cursor:pointer;
  transition:background .15s;
}
.user:hover{ background:var(--surface-2); }
.avatar{
  width:28px; height:28px; border-radius:50%;
  background:var(--gradient-brand);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:12px; font-weight:600;
}
.user-name{ font-family:var(--mono); font-size:12px; color:var(--text-2); }

/* ── body ──────────────────────────────────────────── */
.body{
  flex:1;
  display:flex;
  min-height:0;
}

/* sidebar */
.sidebar{
  width:280px;
  flex:0 0 280px;
  border-right:1px solid var(--border);
  background:var(--surface);
  padding:20px 0;
  overflow-y:auto;
}
.side-title{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-3);
  padding:0 20px 14px;
}
.side-empty{
  padding:0 20px;
  font-size:13px;
  color:var(--text-3);
  letter-spacing:-0.005em;
}

/* main content */
.main{
  flex:1;
  overflow-y:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 40px;
  background:var(--bg);
}
.welcome{
  width:100%;
  max-width:560px;
  text-align:center;
}
.welcome h1{
  font-size:32px;
  line-height:1.15;
  font-weight:700;
  letter-spacing:-0.018em;
  margin:0 0 16px;
}
.welcome .sub{
  font-size:14px;
  color:var(--text-3);
  margin-bottom:48px;
  letter-spacing:-0.005em;
}

.actions{
  display:flex;
  gap:12px;
  justify-content:center;
}
.btn{
  height:52px;
  padding:0 24px;
  border:0;
  border-radius:10px;
  font-family:var(--sans);
  font-size:15px;
  font-weight:500;
  letter-spacing:-0.005em;
  cursor:pointer;
  display:inline-flex; align-items:center; gap:8px;
  transition:filter .15s, background .15s, border-color .15s, transform .05s;
}
.btn-secondary{
  background:var(--surface-2);
  color:var(--text);
  border:1px solid var(--border);
}
.btn-secondary:hover{ background:var(--surface-3); border-color:var(--border-hi); }
.btn-primary{
  background:var(--gradient-brand);
  color:#fff;
  font-weight:600;
}
.btn-primary:hover{ filter:brightness(1.08); }
.btn:active{ transform:translateY(1px); }

/* atmospheric soft glow under the welcome — restraint */
.glow{
  position:fixed;
  inset:auto 0 0 0;
  height:240px;
  pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%, rgba(155,124,255,0.08), transparent 60%);
  z-index:0;
}
.main > *{ position:relative; z-index:1; }
</style>
</head>
<body>
  <div class="topnav">
    <div class="brand">FableGlitch</div>
    <div class="spacer"></div>
    <div class="user">
      <div class="avatar">乐</div>
      <div class="user-name">lemeilin@beva.com</div>
    </div>
  </div>

  <div class="body">
    <aside class="sidebar">
      <div class="side-title">项目树</div>
      <div class="side-empty">
        暂无剧集
      </div>
    </aside>

    <main class="main">
      <div class="glow"></div>
      <div class="welcome">
        <h1>欢迎来到 FableGlitch</h1>
        <div class="sub">看起来是你第一次使用</div>
        <div class="actions">
          <button class="btn btn-secondary">浏览全公司项目树</button>
          <button class="btn btn-primary">＋ 新建我的第一个剧集</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
