<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="design-version" content="1" />
<title>FableGlitch Studio · 首次使用</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0a0a0b; --surface:#131316; --surface-2:#18181d; --surface-3:#1e1e24;
  --border:#25252c; --border-hi:#35353d;
  --text:#f5f5f7; --text-2:#a1a1a8; --text-3:#6b6b72; --text-4:#4a4a50;
  --accent:#9b7cff; --accent-hi:#b294ff;
  --accent-bg:rgba(155,124,255,.12); --accent-border:rgba(155,124,255,.35);
  --green:#4ade80; --amber:#fbbf24; --red:#f87171;
  --gradient-brand:linear-gradient(135deg,#9b7cff 0%,#e879f9 100%);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter','Noto Sans SC',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:var(--sans);
  background:var(--bg); color:var(--text);
  letter-spacing:-0.005em; -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* faked dashboard background underneath the modal */
.bg{
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(155,124,255,0.12), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(232,121,249,0.10), transparent 55%),
    var(--bg);
}
.bg::before{
  content:""; position:absolute; inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:64px 64px;
  opacity:0.18;
  mask-image:radial-gradient(ellipse at center, #000 30%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at center, #000 30%, transparent 75%);
}
.bg .topbar{
  position:absolute; top:0; left:0; right:0; height:56px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.scrim{
  position:fixed; inset:0;
  backdrop-filter:blur(20px) saturate(120%);
  -webkit-backdrop-filter:blur(20px) saturate(120%);
  background:rgba(10,10,11,0.55);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}

.modal{
  width:560px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:48px 48px 28px;
  position:relative;
  text-align:center;
  box-shadow:0 30px 80px -20px rgba(0,0,0,0.7);
}

.close{
  position:absolute; top:14px; right:14px;
  width:32px; height:32px;
  border-radius:8px;
  background:transparent; border:0;
  color:var(--text-3);
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.close:hover{ background:var(--surface-2); color:var(--text); }

.hello{
  font-size:80px; line-height:1;
  margin-bottom:24px;
}

h2{
  font-size:22px; font-weight:600;
  letter-spacing:-0.015em;
  margin:0 0 12px;
  line-height:1.3;
}
.sub{
  font-size:14px; color:var(--text-3);
  margin-bottom:36px;
  line-height:1.5;
}

.choices{
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:32px;
}
.choice{
  display:flex; flex-direction:column; align-items:flex-start;
  text-align:left;
  padding:20px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:filter .15s, background .15s, border-color .15s, transform .05s;
  text-decoration:none;
}
.choice .ico{ font-size:24px; margin-bottom:14px; line-height:1; }
.choice .ttl{ font-size:14px; font-weight:600; margin-bottom:6px; letter-spacing:-0.005em; }
.choice .desc{
  font-size:12px;
  color:var(--text-3); line-height:1.5;
  letter-spacing:-0.005em;
}
.choice:active{ transform:translateY(1px); }

.choice.secondary{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
}
.choice.secondary:hover{ background:var(--surface-3); border-color:var(--border-hi); }

.choice.primary{
  background:var(--gradient-brand);
  color:#fff;
  border:1px solid transparent;
}
.choice.primary .desc{ color:rgba(255,255,255,0.75); }
.choice.primary:hover{ filter:brightness(1.08); }

.foot{
  font-size:11px;
  color:var(--text-4);
  display:flex; justify-content:center; align-items:center; gap:8px;
  letter-spacing:-0.005em;
}
.foot .dot{ color:var(--text-4); }
.foot a{ color:var(--text-3); text-decoration:none; }
.foot a:hover{ color:var(--text-2); }
</style>
</head>
<body>
  <div class="bg"><div class="topbar"></div></div>

  <div class="scrim">
    <div class="modal">
      <button class="close" aria-label="关闭">×</button>

      <div class="hello">👋</div>

      <h2>看起来是你第一次使用 FableGlitch Studio</h2>
      <div class="sub">选一个已有项目加入，或新建一个项目开始</div>

      <div class="choices">
        <a class="choice secondary" href="#">
          <div class="ico">📂</div>
          <div class="ttl">浏览全公司项目树</div>
          <div class="desc">加入已有的剧集</div>
        </a>
        <a class="choice primary" href="#">
          <div class="ico">✨</div>
          <div class="ttl">＋ 新建我的第一个剧集</div>
          <div class="desc">4 步骨架向导</div>
        </a>
      </div>

      <div class="foot">
        <span>首次使用引导</span>
        <span class="dot">·</span>
        <a href="#">可关闭</a>
      </div>
    </div>
  </div>
</body>
</html>
